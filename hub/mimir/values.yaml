# ── Credentials — inject from a Kubernetes Secret ────────────────────────────
# Create a Secret named monitoring-mimir-s3 with keys:
#   S3_ACCESS_KEY, S3_SECRET_KEY, S3_ENDPOINT
# Example:
#   kubectl create secret generic monitoring-mimir-s3 -n monitoring \
#     --from-literal=S3_ENDPOINT=<YOUR_S3_ENDPOINT> \
#     --from-literal=S3_ACCESS_KEY=<YOUR_ACCESS_KEY> \
#     --from-literal=S3_SECRET_KEY=<YOUR_SECRET_KEY>
global:
  # CoreDNS ClusterIP — run: kubectl get svc -n kube-system kube-dns
  dnsService: "10.96.0.10 valid=30s ipv6=off; #"
  extraEnvFrom:
    - secretRef:
        name: monitoring-mimir-s3
  extraArgs:
    config.expand-env: "true"

mimir:
  structuredConfig:
    multitenancy_enabled: true

    tenant_federation:
      enabled: true

    # S3 storage — credentials from env vars
    common:
      storage:
        backend: s3
        s3:
          endpoint: ${S3_ENDPOINT}
          access_key_id: ${S3_ACCESS_KEY}
          secret_access_key: ${S3_SECRET_KEY}
          region: us-east-1
          bucket_lookup_type: path
          insecure: false

    blocks_storage:
      backend: s3
      s3:
        bucket_name: mimir-blocks   # rename to match your S3 bucket

    ruler_storage:
      backend: s3
      s3:
        bucket_name: mimir-ruler

    alertmanager_storage:
      backend: s3
      s3:
        bucket_name: mimir-alertmanager

    compactor:
      data_dir: /data/compactor

    ruler:
      rule_path: /data/ruler-rules

    ingester_client:
      grpc_client_config:
        grpc_compression: snappy

    ingester:
      ring:
        replication_factor: 1

    limits:
      compactor_blocks_retention_period: 90d
      ingestion_rate: 50000
      ingestion_burst_size: 500000
      max_global_series_per_user: 2000000

# ── Component replicas — single replica each ─────────────────────────────────
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 4Gi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

query_frontend:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5
    targetMemoryUtilizationPercentage: 80
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 3Gi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

compactor:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

ruler:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Disable caches — not needed at small scale ───────────────────────────────
chunks-cache:
  enabled: false
index-cache:
  enabled: false
metadata-cache:
  enabled: false
results-cache:
  enabled: false

# ── Disable built-in alertmanager — use standalone component ─────────────────
alertmanager:
  enabled: false

# ── Disable embedded MinIO — use external S3 ─────────────────────────────────
minio:
  enabled: false

# ── NGINX gateway ─────────────────────────────────────────────────────────────
nginx:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - host: hub-mimir.<YOUR_DOMAIN>
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: hub-mimir-tls
        hosts:
          - hub-mimir.<YOUR_DOMAIN>
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      nginx.ingress.kubernetes.io/proxy-body-size: "32m"
      external-dns.alpha.kubernetes.io/target: "<YOUR_EXTERNAL_IP>"
