apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-monthly-reporter-script
  namespace: monitoring
data:
  report.py: |
    #!/usr/bin/env python3
    """Monthly infrastructure report — agentic driver (OpenAI gpt-4o-mini + tool use)."""
    import base64
    import json
    import os
    import smtplib
    import sys
    import time
    import urllib.parse
    import urllib.request
    from datetime import datetime, timezone
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText

    import requests

    # ── Config ──────────────────────────────────────────────────────────────────

    GRAFANA_URL     = os.environ["GRAFANA_URL"]
    GRAFANA_EXT_URL = os.environ["GRAFANA_EXTERNAL_URL"]
    MIMIR_URL       = os.environ["MIMIR_URL"]
    LOKI_URL        = os.environ["LOKI_URL"]
    GRAFANA_USER    = os.environ["GRAFANA_ADMIN_USER"]
    GRAFANA_PASS    = os.environ["GRAFANA_ADMIN_PASS"]
    SMTP_HOST       = os.environ["SMTP_HOST"]
    SMTP_PORT       = int(os.environ["SMTP_PORT"])
    SMTP_FROM       = os.environ["SMTP_FROM"]
    SMTP_PASS       = os.environ["SMTP_PASSWORD"]
    OPENAI_API_KEY  = os.environ["OPENAI_API_KEY"]

    # Optional: cap namespace count for testing
    TEST_NS_LIMIT = int(os.environ["TEST_NS_LIMIT"]) if os.environ.get("TEST_NS_LIMIT") else None

    # ── Time range ───────────────────────────────────────────────────────────────
    # Override via TEST_PERIOD_START / TEST_PERIOD_END / TEST_PERIOD_LABEL for test jobs.

    if os.environ.get("TEST_PERIOD_START"):
        MONTH_START = int(os.environ["TEST_PERIOD_START"])
        MONTH_END   = int(os.environ["TEST_PERIOD_END"])
        MONTH_LABEL = os.environ.get("TEST_PERIOD_LABEL", "Test Period")
    else:
        now         = datetime.now(tz=timezone.utc)
        first_this  = now.replace(day=1, hour=0, minute=0, second=0, microsecond=0)
        last_month  = (first_this.replace(month=first_this.month - 1) if first_this.month > 1
                       else first_this.replace(year=first_this.year - 1, month=12))
        MONTH_START = int(last_month.timestamp())
        MONTH_END   = int(first_this.timestamp())
        MONTH_LABEL = last_month.strftime("%B %Y")

    MONTH_DUR = MONTH_END - MONTH_START
    print(f"[reporter] period: {MONTH_LABEL}  {MONTH_START} -> {MONTH_END}  ({MONTH_DUR}s)")

    # ── Grafana HTTP helper ──────────────────────────────────────────────────────

    def _grafana_auth_header():
        creds = base64.b64encode(f"{GRAFANA_USER}:{GRAFANA_PASS}".encode()).decode()
        return {"Authorization": f"Basic {creds}"}

    def _grafana_get(path):
        url = GRAFANA_URL + path
        req = urllib.request.Request(url, headers=_grafana_auth_header())
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())

    # ── Recipient cache (set by list_all_grafana_users, used by send_report) ─────

    _recipient_cache = []

    # ── Tool implementations ─────────────────────────────────────────────────────

    def tool_list_grafana_orgs(args):
        orgs = _grafana_get("/api/orgs")
        result = [{"id": o["id"], "name": o["name"]} for o in orgs if o["id"] != 1]
        if TEST_NS_LIMIT:
            result = result[:TEST_NS_LIMIT]
            print(f"  [test] namespace list capped to {TEST_NS_LIMIT}")
        return result

    def tool_list_all_grafana_users(args):
        global _recipient_cache
        emails = []
        page = 1
        while True:
            users = _grafana_get(f"/api/users?perpage=1000&page={page}")
            if not users:
                break
            for u in users:
                email = u.get("email", "")
                if "@" in email and "." in email.split("@")[-1]:
                    emails.append(email)
            if len(users) < 1000:
                break
            page += 1
        _recipient_cache = sorted(set(emails))
        print(f"  [users] {len(_recipient_cache)} recipients found")
        return _recipient_cache

    def tool_query_mimir(args):
        promql  = args["promql"]
        cluster = args["cluster"]
        end     = args["end"]
        params  = urllib.parse.urlencode({"query": promql, "time": end})
        url     = f"{MIMIR_URL}/prometheus/api/v1/query?{params}"
        req     = urllib.request.Request(url, headers={"X-Scope-OrgID": cluster})
        try:
            with urllib.request.urlopen(req, timeout=60) as r:
                data = json.loads(r.read())
            results = data.get("data", {}).get("result", [])
            if results:
                return float(results[0]["value"][1])
        except Exception as e:
            print(f"  [warn] mimir: {e}")
        return None

    def tool_query_loki(args):
        logql  = args["logql"]
        tenant = args["tenant"]
        end    = args["end"]
        params = urllib.parse.urlencode({"query": logql, "time": end, "limit": "1"})
        url    = f"{LOKI_URL}/loki/api/v1/query?{params}"
        req    = urllib.request.Request(url, headers={"X-Scope-OrgID": tenant})
        try:
            with urllib.request.urlopen(req, timeout=60) as r:
                data = json.loads(r.read())
            results = data.get("data", {}).get("result", [])
            if results:
                return float(results[0]["value"][1])
        except Exception as e:
            print(f"  [warn] loki: {e}")
        return None

    def tool_send_report(args):
        subject   = args["subject"]
        html_body = args["html_body"]
        to_addrs  = _recipient_cache
        if not to_addrs:
            print("[reporter] no recipients — aborting")
            sys.exit(1)
        msg = MIMEMultipart("alternative")
        msg["Subject"] = subject
        msg["From"]    = SMTP_FROM
        msg["To"]      = ", ".join(to_addrs)
        msg.attach(MIMEText(html_body, "html"))
        with smtplib.SMTP(SMTP_HOST, SMTP_PORT, timeout=30) as s:
            s.ehlo()
            s.starttls()
            s.login(SMTP_FROM, SMTP_PASS)
            failed = s.sendmail(SMTP_FROM, to_addrs, msg.as_string())
        if failed:
            print(f"  [warn] partial delivery failure: {failed}")
        print(f"[reporter] report sent to {len(to_addrs)} recipients")
        sys.exit(0)

    TOOL_DISPATCH = {
        "list_grafana_orgs":      tool_list_grafana_orgs,
        "list_all_grafana_users": tool_list_all_grafana_users,
        "query_mimir":            tool_query_mimir,
        "query_loki":             tool_query_loki,
        "send_report":            tool_send_report,
    }

    # ── OpenAI tool schema ────────────────────────────────────────────────────────

    TOOLS = [
        {
            "type": "function",
            "function": {
                "name": "list_grafana_orgs",
                "description": "List all Grafana organizations (id=1 already excluded). Returns [{id, name}].",
                "parameters": {"type": "object", "properties": {}, "required": []},
            },
        },
        {
            "type": "function",
            "function": {
                "name": "list_all_grafana_users",
                "description": "List all real Grafana user emails (admin@localhost already filtered). Returns [email].",
                "parameters": {"type": "object", "properties": {}, "required": []},
            },
        },
        {
            "type": "function",
            "function": {
                "name": "query_mimir",
                "description": "Run a PromQL instant query against Mimir. Returns float or null.",
                "parameters": {
                    "type": "object",
                    "properties": {
                        "promql":  {"type": "string", "description": "PromQL expression"},
                        "cluster": {"type": "string", "description": "Tenant (cluster name, e.g. hub or spoke-1)"},
                        "start":   {"type": "integer", "description": "Start Unix timestamp"},
                        "end":     {"type": "integer", "description": "End Unix timestamp"},
                    },
                    "required": ["promql", "cluster", "start", "end"],
                },
            },
        },
        {
            "type": "function",
            "function": {
                "name": "query_loki",
                "description": "Run a LogQL metric query against Loki. Returns float or null.",
                "parameters": {
                    "type": "object",
                    "properties": {
                        "logql":  {"type": "string", "description": "LogQL expression"},
                        "tenant": {"type": "string", "description": "Loki tenant e.g. hub-monitoring or spoke-1-myapp"},
                        "start":  {"type": "integer", "description": "Start Unix timestamp"},
                        "end":    {"type": "integer", "description": "End Unix timestamp"},
                    },
                    "required": ["logql", "tenant", "start", "end"],
                },
            },
        },
        {
            "type": "function",
            "function": {
                "name": "send_report",
                "description": "Send the final HTML report email to all Grafana users. Call as the LAST action.",
                "parameters": {
                    "type": "object",
                    "properties": {
                        "subject":   {"type": "string", "description": "Email subject line"},
                        "html_body": {"type": "string", "description": "Full HTML email body"},
                    },
                    "required": ["subject", "html_body"],
                },
            },
        },
    ]

    # ── Prompts ───────────────────────────────────────────────────────────────────

    SYSTEM_PROMPT = (
        "You are an infrastructure reporter. You have tools to query Prometheus (Mimir) "
        "and Loki, and a tool to send an email report. "
        "Always call send_report() as your final action."
    )

    USER_PROMPT = (
        f"Generate the monthly infrastructure report for {MONTH_LABEL}.\n"
        f"Reporting period: Unix {MONTH_START} to {MONTH_END} (duration: {MONTH_DUR}s).\n"
        f"Grafana dashboard link for the footer: {GRAFANA_EXT_URL}/dashboards\n"
        "\n"
        "Steps:\n"
        "1. Call list_grafana_orgs() — returns all namespace orgs already filtered.\n"
        "2. Call list_all_grafana_users() — returns the recipient list.\n"
        "3. For each org (name format: 'cluster-namespace'):\n"
        "   - cluster prefix: the text before the first '-' in the org name\n"
        "     (e.g. 'hub' for 'hub-monitoring', 'spoke-1' for 'spoke-1-myapp')\n"
        "   - Query Mimir (X-Scope-OrgID = cluster) for these metrics using start/end from above:\n"
        "     * Total requests: sum(increase(traces_spanmetrics_calls_total{namespace='NS'}[DURs]))\n"
        "     * Total errors: sum(increase(traces_spanmetrics_calls_total{namespace='NS',status_code='STATUS_CODE_ERROR'}[DURs]))\n"
        "     * p95 latency ms: histogram_quantile(0.95, sum by(le)(rate(traces_spanmetrics_duration_seconds_bucket{namespace='NS'}[DURs]))) * 1000\n"
        "     * Avg CPU cores: avg_over_time(sum(rate(container_cpu_usage_seconds_total{container!='',namespace='NS'}[5m]))[DURs:5m])\n"
        "     * Avg RAM GB: avg_over_time(sum(container_memory_working_set_bytes{container!='',namespace='NS'})[DURs:5m]) / 1073741824\n"
        "   - Query Loki (tenant = 'cluster-namespace') for:\n"
        "     * Log lines: sum(count_over_time({namespace='NS'}[DURs]))\n"
        "     * Log GB: sum(bytes_over_time({namespace='NS'}[DURs])) / 1073741824\n"
        f"   - Replace DUR with {MONTH_DUR}s and NS with the actual namespace name.\n"
        "   - Skip namespaces where all queried metrics are null or zero.\n"
        "4. Build ONE professional HTML email:\n"
        "   - Dark blue header with report title and month\n"
        "   - Summary table: all active namespaces, columns: Namespace, Req/s, Error%, p95ms, CPU, RAM\n"
        "   - Per-namespace section: metrics table + status badge + 2-3 sentence analysis\n"
        "   - Status: Healthy (<1% errors), Warning (1-5%), Critical (>5%), Unknown (no trace data)\n"
        "   - Footer with generation timestamp and Grafana link\n"
        "5. Call send_report(subject, html_body).\n"
    )

    # ── OpenAI agentic loop ───────────────────────────────────────────────────────

    def openai_chat(messages):
        """POST to OpenAI with retry on 429 — handles free-tier rate limits."""
        for attempt in range(6):
            resp = requests.post(
                "https://api.openai.com/v1/chat/completions",
                headers={"Authorization": f"Bearer {OPENAI_API_KEY}",
                         "Content-Type": "application/json"},
                json={"model": "gpt-4o-mini", "max_tokens": 8192,
                      "tools": TOOLS, "messages": messages},
                timeout=120,
            ).json()
            if "error" in resp and resp.get("error", {}).get("code") == "rate_limit_exceeded":
                wait = 20 * (attempt + 1)
                print(f"  [rate_limit] waiting {wait}s (attempt {attempt + 1})")
                time.sleep(wait)
                continue
            if "error" in resp:
                print(f"[reporter] OpenAI error: {resp['error']}")
                sys.exit(1)
            return resp
        raise RuntimeError("OpenAI rate limit persists after retries")

    def main():
        print(f"[reporter] starting agentic reporter for {MONTH_LABEL}")
        messages = [
            {"role": "system", "content": SYSTEM_PROMPT},
            {"role": "user",   "content": USER_PROMPT},
        ]
        iterations = 0
        while iterations < 200:
            iterations += 1
            resp   = openai_chat(messages)
            choice = resp["choices"][0]
            msg    = choice["message"]
            messages.append(msg)

            if choice["finish_reason"] == "stop":
                print("[reporter] AI finished without calling send_report — exiting")
                sys.exit(1)

            for tc in msg.get("tool_calls", []):
                fn_name = tc["function"]["name"]
                fn_args = json.loads(tc["function"]["arguments"])
                print(f"  [tool] {fn_name}({list(fn_args.keys())})")
                result = TOOL_DISPATCH[fn_name](fn_args)
                messages.append({
                    "role":         "tool",
                    "tool_call_id": tc["id"],
                    "content":      json.dumps(result),
                })

        print("[reporter] iteration limit reached — exiting")
        sys.exit(1)

    main()
