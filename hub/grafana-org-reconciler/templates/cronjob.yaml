apiVersion: batch/v1
kind: CronJob
metadata:
  name: grafana-org-reconciler
  namespace: monitoring
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: grafana-org-reconciler
          restartPolicy: Never
          containers:
            - name: reconciler
              image: {{ .Values.image | quote }}
              command: ["/bin/bash", "/scripts/reconcile.sh"]
              env:
                - name: GRAFANA_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: admin-user
                - name: GRAFANA_ADMIN_PASS
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-secret
                      key: admin-password
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: script
              configMap:
                name: grafana-org-reconciler-script
                defaultMode: 0755
